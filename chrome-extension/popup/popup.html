<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GitSolve AI</title>
  <style>
    :root {
      --bg: #0b1020; --panel: #141a2e; --line: #233056;
      --text: #e8ecf5; --muted: #9aa6c4; --accent: #6ea8fe; --ok: #37d67a; --err: #f87171;
    }
    * { box-sizing: border-box; }
    body { width: 320px; margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); }
    header { display: flex; align-items: center; gap: 10px; padding: 16px; border-bottom: 1px solid var(--line); }
    .logo { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, #6ea8fe, #9b8cff); display: grid; place-items: center; font-weight: 800; color: #0b1020; }
    h1 { font-size: 15px; margin: 0; letter-spacing: .2px; }
    .sub { font-size: 11px; color: var(--muted); }
    main { padding: 16px; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 14px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--err); }
    .dot.on { background: var(--ok); }
    button { width: 100%; border: 0; border-radius: 10px; padding: 11px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .primary { background: var(--accent); color: #0b1020; }
    .ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); margin-top: 8px; }
    a.dash { display: block; text-align: center; margin-top: 10px; font-size: 12px; color: var(--accent); text-decoration: none; }
    .recent { margin-top: 18px; }
    .recent h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 0 0 8px; }
    .item { display: flex; justify-content: space-between; gap: 8px; padding: 8px 0; border-top: 1px solid var(--line); font-size: 12px; }
    .item .t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item .s { font-size: 10px; padding: 2px 6px; border-radius: 999px; background: #1c2748; color: var(--muted); flex: none; }
    .item .s.saved { color: var(--ok); }
    .item .s.err { color: var(--err); }
    .empty { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="logo">G</div>
    <div>
      <h1>GitSolve AI</h1>
      <div class="sub">Accepted solutions &rarr; GitHub</div>
    </div>
  </header>
  <main>
    <div class="status"><span id="dot" class="dot"></span><span id="statusText">Checking…</span></div>
    <button id="authBtn" class="primary">Connect GitHub</button>
    <button id="logoutBtn" class="ghost" style="display:none">Disconnect</button>
    <a class="dash" id="dashLink" href="http://localhost:5173" target="_blank">Open dashboard &rarr;</a>

    <div class="recent">
      <h2>Recent activity</h2>
      <div id="recent"><div class="empty">No submissions captured yet.</div></div>
    </div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
